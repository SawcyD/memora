name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src-tauri/Cargo.toml
      - src-tauri/Cargo.lock
      - src-tauri/tauri.conf.json
      - src/pages/About.tsx

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish signed NSIS release
    if: github.event_name != 'release' || github.event.release.draft == false
    runs-on: windows-latest
    timeout-minutes: 60
    environment: release

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Verify synchronized semantic version
        run: npm run version:check

      - name: Validate release trigger and tag
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          $version = node -p "require('./package.json').version"
          $expectedTag = "v$version"

          if ($env:EVENT_NAME -eq "release" -and $env:RELEASE_TAG -ne $expectedTag) {
            throw "Release tag '$env:RELEASE_TAG' does not match package version '$expectedTag'."
          }

          if ($env:EVENT_NAME -eq "push" -and (git tag --list $expectedTag)) {
            throw "Tag '$expectedTag' already exists. Bump the version before merging another release change."
          }

      - name: Verify updater signing configuration
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing Actions secret TAURI_SIGNING_PRIVATE_KEY. See docs/RELEASING.md."
          }
          if (-not $env:TAURI_UPDATER_PUBLIC_KEY) {
            throw "Missing Actions variable TAURI_UPDATER_PUBLIC_KEY. See docs/RELEASING.md."
          }

      - name: Prepare release updater configuration
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: npm run updater:prepare-config

      - name: Build, tag, and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || 'v__VERSION__' }}
          releaseName: Memora v__VERSION__
          releaseBody: Signed Windows installer and Tauri updater metadata. See the generated release notes for changes.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || false }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.release.generated.conf.json
