name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Windows application
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Verify synchronized semantic version
        run: npm run version:check

      - name: Type-check reusable UI package
        run: npm run ui:typecheck

      - name: Build reusable UI package
        run: npm run ui:build

      - name: Build frontend
        run: npm run build

      - name: Check Rust application
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

      - name: Test Rust application
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml
